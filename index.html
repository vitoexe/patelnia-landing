<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patelnia.ovh | Pustynia Korath</title>
    <link rel="icon" type="image/svg+xml" href="favicon-light.svg" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/svg+xml" href="favicon-dark.svg" media="(prefers-color-scheme: dark)">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Domyślne wartości dla dnia */
            --bg-top: 255, 235, 150;
            --bg-mid: 225, 140, 55;
            --bg-bottom: 165, 75, 30;
            --text-main: 255, 240, 220;
            --text-muted: 255, 215, 175;
        }

        html {
            background-color: rgb(var(--bg-top));
        }

        body {
            margin: 0;
            overflow-x: hidden;
            font-family: 'Montserrat', sans-serif;
            color: rgb(var(--text-main));
            user-select: none;
            /* Zapobiega zaznaczaniu tekstu podczas przeciągania słońca */
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background: linear-gradient(to bottom, rgb(var(--bg-top)), rgb(var(--bg-mid)), rgb(var(--bg-bottom)));
            z-index: -1;
            transition: background 0.1s ease;
            pointer-events: none;
        }

        h1,
        h2,
        .witcher-font {
            font-family: 'Cinzel', serif;
        }

        .text-main {
            color: rgb(var(--text-main));
        }

        .text-muted {
            color: rgb(var(--text-muted));
        }

        .bg-muted {
            background-color: rgb(var(--text-muted));
        }

        #sandCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            z-index: 1;
            pointer-events: none;
        }

        .content-wrapper {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 5rem 1rem 2rem 1rem;
            background: radial-gradient(circle, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.4) 100%);
        }

        .heat-haze {
            animation: haze 4s infinite alternate ease-in-out;
        }

        @keyframes haze {
            0% {
                transform: translateY(0) skewX(0deg);
                opacity: 0.9;
            }

            100% {
                transform: translateY(-3px) skewX(1deg);
                opacity: 1;
                text-shadow: 0 5px 15px rgba(var(--text-main), 0.3);
            }
        }

        /* Suwak czasu */
        .time-control {
            position: absolute;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            width: 85%;
            max-width: 280px;
        }

        .slider-custom {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 4px;
            outline: none;
            border: 1px solid rgba(var(--text-muted), 0.3);
        }

        .slider-custom::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgb(var(--text-main));
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(0, 0, 0, 0.3);
        }

        .slider-custom::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgb(var(--text-main));
            cursor: pointer;
            border: 2px solid rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.6);
        }
    </style>
</head>

<body>

    <!-- Panel kontroli czasu (Suwak) -->
    <div class="time-control flex flex-col items-center" id="timeControl">
        <div class="flex items-center gap-3 mb-3">
            <div id="celestialIcon" class="text-main" style="filter: drop-shadow(0 0 8px currentColor); transition: all 0.3s ease;">
                <!-- Słońce/Księżyc (ikony bez zmian) -->
                <svg id="iconSun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg id="iconMoon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="hidden">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </div>
            <span class="text-main witcher-font text-lg font-bold tracking-widest" id="timeLabel">--:--</span>
        </div>
        <input type="range" id="timeSlider" min="0" max="23.99" step="any" class="slider-custom">
        <label for="timeSlider" class="text-muted witcher-font text-[13px] uppercase tracking-[0.4em] font-bold mt-2">WARSZAWA</label>
    </div>

    <!-- Canvas dla efektu piasku -->
    <canvas id="sandCanvas"></canvas>


    <div class="content-wrapper w-full">
        <p id="subtitleText" class="text-[10px] md:text-sm tracking-[0.3em] uppercase mb-4 text-muted px-2" style="opacity: 0.7;">Witaj na krawędzi świata</p>

        <h1 class="text-6xl sm:text-6xl md:text-8xl font-bold mb-6 heat-haze text-main drop-shadow-lg select-none px-4 break-words w-full leading-none" id="mainTitle">
            patelnia.<wbr>ovh
        </h1>

        <div class="w-16 md:w-24 h-[1px] bg-muted opacity-50 mb-6"></div>

        <p id="mainDesc" class="text-base md:text-xl max-w-2xl font-light text-main px-2" style="opacity: 0.9;">
            Bezkresne morze piasku, żar lejący się z nieba i fatamorgany.<br class="hidden md:block">
            Znalazłeś się w miejscu, gdzie przetrwają tylko nieliczni.
            <span class="block mt-4 text-xs md:text-sm italic" id="dynamicText">Szukałeś oazy, ale tutaj słońce wypala nawet cień nadziei.</span>
        </p>
    </div>

    <script>
        console.log("TEST");

        // Funkcja do logowania wiadomości w konsoli z prefiksem
        const log = (message) => console.log('%c[vito.exe - DraggableNotification]', 'background: linear-gradient(to right, #6e00ff, #be00ff); color: white; font-weight: bold; padding: 2px 6px; border-radius: 4px; text-shadow: 0 0 4px black;', message);

        log("Korath Desert environment initialized. Mobile margins optimized.");

        const timeSlider = document.getElementById('timeSlider');
        const timeLabel = document.getElementById('timeLabel');
        const dynamicText = document.getElementById('dynamicText');

        let currentSandColor = '180, 90, 35';

        const nightColors = { top: [5, 8, 20], mid: [11, 19, 43], bot: [2, 4, 10], main: [157, 178, 191], muted: [100, 130, 160], sand: [100, 130, 180] };
        const dawnColors = { top: [45, 32, 56], mid: [112, 66, 90], bot: [196, 121, 109], main: [255, 214, 201], muted: [255, 160, 140], sand: [255, 180, 150] };
        const dayColors = { top: [255, 235, 150], mid: [225, 140, 55], bot: [165, 75, 30], main: [255, 240, 220], muted: [255, 215, 175], sand: [180, 90, 35] };
        const duskColors = { top: [74, 28, 33], mid: [140, 51, 37], bot: [196, 85, 37], main: [255, 179, 138], muted: [220, 100, 80], sand: [255, 100, 80] };

        let colorStops = [
            { h: 0, ...nightColors },
            { h: 4, ...nightColors },
            { h: 6, ...dawnColors },
            { h: 7, ...dayColors },
            { h: 12, ...dayColors },
            { h: 19, ...dayColors },
            { h: 19.5, ...duskColors },
            { h: 21, ...nightColors },
            { h: 24, ...nightColors }
        ];

        let currentHours = 12;

        function formatTime(decimalHours) {
            const hrs = Math.floor(decimalHours);
            const mins = Math.floor((decimalHours - hrs) * 60);
            return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;
        }

        function initSolarCycle() {
            log("Determining astronomical parameters for fixed position (Warsaw)...");

            function getWarsawSolarTimes(date) {
                const lat = 52.2297;
                const lng = 21.0122;
                const rad = Math.PI / 180;

                const start = new Date(Date.UTC(date.getFullYear(), 0, 0));
                const today = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
                const dayOfYear = (today - start) / 86400000;

                const b = (360 / 365) * (dayOfYear - 81) * rad;
                const eot = 9.87 * Math.sin(2 * b) - 7.53 * Math.cos(b) - 1.5 * Math.sin(b);
                const tc = 4 * lng + eot;
                const decl = 23.45 * Math.sin((360 / 365) * (dayOfYear - 81) * rad) * rad;

                const calcHourAngle = (angleDeg) => {
                    const hArg = (Math.sin(angleDeg * rad) - Math.sin(lat * rad) * Math.sin(decl)) / (Math.cos(lat * rad) * Math.cos(decl));
                    return Math.acos(Math.max(-1, Math.min(1, hArg))) / rad;
                };

                const noonUtc = 12 - (tc / 60);
                const haSunrise = calcHourAngle(-0.833) / 15;
                const haTwilight = calcHourAngle(-18) / 15;

                const toLocalHour = (utcHours) => {
                    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate(), Math.floor(utcHours), Math.floor((utcHours % 1) * 60)));
                    return d.getHours() + d.getMinutes() / 60;
                };

                return {
                    dawnStart: toLocalHour(noonUtc - haTwilight),
                    sunrise: toLocalHour(noonUtc - haSunrise),
                    noon: toLocalHour(noonUtc),
                    sunset: toLocalHour(noonUtc + haSunrise),
                    duskEnd: toLocalHour(noonUtc + haTwilight)
                };
            }

            const now = new Date();
            const solar = getWarsawSolarTimes(now);

            let dawnStart = solar.dawnStart;
            let sunrise = solar.sunrise;
            let noon = solar.noon;
            let sunset = solar.sunset;
            let duskEnd = solar.duskEnd;

            if (isNaN(dawnStart) || dawnStart >= sunrise) dawnStart = Math.max(0, sunrise - 1.5);
            if (isNaN(duskEnd) || duskEnd <= sunset) duskEnd = Math.min(24, sunset + 1.5);
            let dayStart = Math.min(sunrise + 1, noon - 0.5);
            let dayEnd = Math.max(sunset - 0.5, noon + 0.5);

            colorStops = [
                { h: 0, ...nightColors },
                { h: dawnStart, ...nightColors },
                { h: sunrise, ...dawnColors },
                { h: dayStart, ...dayColors },
                { h: noon, ...dayColors },
                { h: dayEnd, ...dayColors },
                { h: sunset, ...duskColors },
                { h: duskEnd, ...nightColors },
                { h: 24, ...nightColors }
            ];

            log(`Diurnal cycle synchronized (Warsaw): Sunrise ${formatTime(sunrise)}, Sunset ${formatTime(sunset)}.`);

            const currentNow = new Date();
            currentHours = currentNow.getHours() + (currentNow.getMinutes() / 60) + (currentNow.getSeconds() / 3600);
            timeSlider.value = currentHours;

            updateEnvironment(currentHours);
        }

        function lerp(start, end, amt) {
            return Math.round(start + (end - start) * amt);
        }

        function interpolateColors(h) {
            let stop1 = colorStops[0], stop2 = colorStops[1];
            for (let i = 0; i < colorStops.length - 1; i++) {
                if (h >= colorStops[i].h && h <= colorStops[i + 1].h) {
                    stop1 = colorStops[i];
                    stop2 = colorStops[i + 1];
                    break;
                }
            }
            const range = stop2.h - stop1.h;
            const factor = range === 0 ? 0 : (h - stop1.h) / range;
            const colors = {};
            ['top', 'mid', 'bot', 'main', 'muted', 'sand'].forEach(key => {
                colors[key] = [
                    lerp(stop1[key][0], stop2[key][0], factor),
                    lerp(stop1[key][1], stop2[key][1], factor),
                    lerp(stop1[key][2], stop2[key][2], factor)
                ];
            });
            return colors;
        }

        function updateEnvironment(hours) {
            const colors = interpolateColors(hours);
            const root = document.documentElement;
            root.style.setProperty('--bg-top', colors.top.join(','));
            root.style.setProperty('--bg-mid', colors.mid.join(','));
            root.style.setProperty('--bg-bottom', colors.bot.join(','));
            root.style.setProperty('--text-main', colors.main.join(','));
            root.style.setProperty('--text-muted', colors.muted.join(','));
            currentSandColor = colors.sand.join(',');

            timeLabel.textContent = formatTime(hours);
            const dawnStartH = colorStops[1].h;
            const sunriseH = colorStops[2].h;
            const sunsetH = colorStops[6].h;
            const duskEndH = colorStops[7].h;
            if (hours >= duskEndH || hours < dawnStartH) {
                dynamicText.innerHTML = "Głęboka noc. Przenikliwy ziąb i absolutna ciemność. Słyszysz wycie z oddali.";
            } else if (hours >= dawnStartH && hours < sunriseH) {
                dynamicText.innerHTML = "Brzask nieśmiało rozprasza mrok. Za chwilę słońce znów zacznie palić.";
            } else if (hours >= sunsetH && hours < duskEndH) {
                dynamicText.innerHTML = "Słońce zaszło. Mrok powoli pochłania horyzont, niosąc zwodniczą ulgę.";
            } else {
                dynamicText.innerHTML = "Szukałeś oazy, ale tutaj słońce wypala nawet cień nadziei.";
            }
            const iconSun = document.getElementById('iconSun');
            const iconMoon = document.getElementById('iconMoon');
            if (iconSun && iconMoon) {
                if (hours >= sunriseH && hours < sunsetH) {
                    iconSun.classList.remove('hidden');
                    iconMoon.classList.add('hidden');
                } else {
                    iconSun.classList.add('hidden');
                    iconMoon.classList.remove('hidden');
                }
            }
        }

        let isManualMode = false;
        let autoRefreshInterval;

        function syncRealTime() {
            if (isManualMode) return;
            const now = new Date();
            currentHours = now.getHours() + (now.getMinutes() / 60) + (now.getSeconds() / 3600);
            timeSlider.value = currentHours;
            updateEnvironment(currentHours);
        }

        timeSlider.addEventListener('input', (e) => {
            if (!isManualMode) {
                isManualMode = true;
                clearInterval(autoRefreshInterval);
                log("Manual interference in time stream. Automatic refresh stopped.");
            }
            currentHours = parseFloat(e.target.value);
            updateEnvironment(currentHours);
        });

        autoRefreshInterval = setInterval(syncRealTime, 1000);

        const canvas = document.getElementById('sandCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset();
                this.y = Math.random() * height;
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 2 + height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 3 + 1;
                this.speedY = Math.random() * -1 - 0.5;
                this.opacity = Math.random() * 0.7 + 0.3;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > width || this.y < 0) {
                    this.x = -10;
                    this.y = Math.random() * height;
                }
            }
            draw(nightFactor) {
                let finalOpacity = this.opacity;

                const fadeStart = height * 0.75;
                if (this.y > fadeStart) {
                    const depth = (this.y - fadeStart) / (height - fadeStart);
                    const minVisibility = 0.15 * (1 - nightFactor);
                    finalOpacity *= Math.max(minVisibility, 1 - (depth * 2));
                }
                ctx.fillStyle = `rgba(${currentSandColor}, ${finalOpacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        const particleCount = window.innerWidth < 768 ? 80 : 250;
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);

            // Oblicz zmienną nightFactor raz na klatkę dla wszystkich cząsteczek
            const dawnStartH = colorStops[1].h;
            const sunriseH = colorStops[2].h;
            const sunsetH = colorStops[6].h;
            const duskEndH = colorStops[7].h;

            let nightFactor = 0;
            if (currentHours >= duskEndH || currentHours <= dawnStartH) {
                nightFactor = 1;
            } else if (currentHours > sunsetH && currentHours < duskEndH) {
                nightFactor = (currentHours - sunsetH) / (duskEndH - sunsetH);
            } else if (currentHours > dawnStartH && currentHours < sunriseH) {
                nightFactor = 1 - ((currentHours - dawnStartH) / (sunriseH - dawnStartH));
            }

            particles.forEach(p => {
                p.update();
                p.draw(nightFactor);
            });
            requestAnimationFrame(animate);
        }
        animate();
        syncRealTime();
        initSolarCycle();
    </script>
</body>

</html>
